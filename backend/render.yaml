services:
  - type: web
    name: malaria-detection-api
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    envVars:
      - key: MODEL_PATH
        value: models/tiny_malaria_model.h5
      - key: PYTHON_VERSION
        value: 3.10.12
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p models
    startCommand: gunicorn app:app