<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VC's Birthday Surprise | Honoring Our Father</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent accidental text selection on splash */
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            background: linear-gradient(145deg, #f9f3e6 0%, #ffe6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* MAIN APP CARD (input screen) */
        .app-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(3px);
            border-radius: 64px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255,255,255,0.8);
            padding: 3rem 2rem;
            width: 90%;
            max-width: 550px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,215,150,0.8);
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #b5651e, #d98c2f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #aa7a5c;
            font-weight: 500;
            margin-bottom: 2rem;
            border-bottom: 2px dotted #f7cd9c;
            display: inline-block;
            padding-bottom: 6px;
        }

        .date-card {
            background: #fff6ed;
            border-radius: 48px;
            padding: 1.8rem;
            margin: 1.5rem 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        label {
            font-weight: 600;
            color: #c26a2e;
            display: block;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .date-input-area {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        input {
            font-size: 1.5rem;
            padding: 12px 20px;
            border: 2px solid #f7cf9c;
            border-radius: 60px;
            text-align: center;
            font-family: monospace;
            font-weight: bold;
            background: white;
            width: 180px;
            letter-spacing: 1px;
            transition: 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #e07c2c;
            box-shadow: 0 0 0 3px rgba(224,124,44,0.2);
        }

        .hint {
            font-size: 0.8rem;
            color: #b97f55;
            margin-top: 12px;
        }

        button {
            background: linear-gradient(95deg, #e67e22, #f39c12);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(230,126,34,0.3);
            margin-top: 8px;
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #f39c12, #e67e22);
            box-shadow: 0 8px 18px rgba(230,126,34,0.4);
        }

        /* FULLSCREEN SPLASH (initially hidden) */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #ffd966, #ffb347);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: brightness(1.05);
            font-family: 'Poppins', cursive;
            text-align: center;
            overflow: hidden;
        }

        .splash-active {
            opacity: 1 !important;
            visibility: visible !important;
        }

        .happy-message {
            font-size: clamp(2.2rem, 12vw, 5.8rem);
            font-weight: 900;
            color: #fff9e8;
            text-shadow: 8px 8px 0px #b64926, 12px 12px 20px rgba(0,0,0,0.3);
            letter-spacing: 4px;
            animation: zoomGlow 0.8s ease-out, floatText 2s infinite alternate;
            margin-bottom: 1rem;
            z-index: 10;
        }

        .father-title {
            font-size: clamp(1.5rem, 6vw, 2.8rem);
            background: #fff3cf;
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 60px;
            color: #c25d1a;
            font-weight: bold;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            margin-top: 0.5rem;
            animation: pulsePop 1s infinite ease;
        }

        /* animations */
        @keyframes zoomGlow {
            0% { transform: scale(0.3); opacity: 0; text-shadow: 0 0 0px gold; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; text-shadow: 8px 8px 0px #b64926; }
        }

        @keyframes floatText {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        @keyframes pulsePop {
            0% { transform: scale(1); background: #fff3cf; }
            50% { transform: scale(1.05); background: #ffefb0; box-shadow: 0 18px 30px rgba(0,0,0,0.3);}
            100% { transform: scale(1); background: #fff3cf; }
        }

        /* confetti pieces & balloons */
        .confetti {
            position: absolute;
            width: 12px;
            height: 20px;
            background: #f1c40f;
            opacity: 0.8;
            animation: fall 3s linear infinite;
            z-index: 15;
        }

        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(120vh) rotate(360deg); opacity: 0; }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 45px;
            height: 55px;
            border-radius: 50%;
            animation: rise 6s ease-in infinite;
            opacity: 0.85;
            z-index: 12;
            box-shadow: inset -5px -5px 0px rgba(0,0,0,0.1);
        }

        .balloon:after {
            content: "🧵";
            position: absolute;
            bottom: -20px;
            left: 18px;
            font-size: 14px;
            transform: rotate(10deg);
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.9; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        .spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, gold, orange);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }

        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* firework effect */
        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff5e00, #ffbb00);
            box-shadow: 0 0 12px red;
            animation: explode 0.6s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(0.2); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        /* timer bar */
        .splash-timer {
            position: absolute;
            bottom: 30px;
            left: 20%;
            width: 60%;
            height: 8px;
            background: rgba(255,255,200,0.5);
            border-radius: 20px;
            overflow: hidden;
            z-index: 50;
        }

        .timer-progress {
            height: 100%;
            width: 100%;
            background: #ffdd77;
            animation: shrinkTimer 10s linear forwards;
        }

        @keyframes shrinkTimer {
            0% { width: 100%; background: #ffcc33; }
            100% { width: 0%; background: #ffaa22; }
        }

        .exit-msg {
            position: absolute;
            bottom: 90px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            backdrop-filter: blur(2px);
            z-index: 55;
            pointer-events: none;
        }

        /* popup notification emulation */
        .popup-toast {
            position: fixed;
            background: #fff8e7;
            color: #d45a1c;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 3000;
            font-size: 1.2rem;
            white-space: nowrap;
            animation: popFly 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            pointer-events: none;
        }

        @keyframes popFly {
            0% { transform: scale(0.2) translateY(20px); opacity: 0; }
            60% { transform: scale(1.1) translateY(-10px); }
            100% { transform: scale(1) translateY(0px); opacity: 1; top: 20%; left: 30%; }
        }

        /* responsive */
        @media (max-width: 550px) {
            .app-container { padding: 2rem 1rem; }
            .happy-message { letter-spacing: 2px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container" id="appUi">
    <h1>🎂 Hon'ble Vice Chancellor 🎂</h1>
    <div class="sub">Father of our University Family</div>
    <div class="date-card">
        <label>📅 Enter the sacred date 🕯️</label>
        <div class="date-input-area">
            <input type="text" id="dateInput" placeholder="20/05/2026" autocomplete="off" value="">
        </div>
        <div class="hint">✨ Type <strong>20/05/</strong>any year (e.g., 20/05/2024) ✨</div>
        <button id="celebrateBtn">🎁 Surprise Him! 🎁</button>
    </div>
    <p style="margin-top: 18px; font-size: 0.85rem; color: #bd7a48;">🌸 Our beloved VC, the guiding light 🌸</p>
</div>

<!-- SPLASH SCREEN 10+ seconds with all celebratory elements -->
<div id="splashScreen" class="splash-overlay">
    <div class="happy-message">🎉 HAPPY BIRTHDAY FATHER 🎉</div>
    <div class="father-title">💐 Respected Vice Chancellor 💐</div>
    <div class="splash-timer"><div class="timer-progress"></div></div>
    <div class="exit-msg">❤️ Celebrating our pillar of strength ❤️</div>
</div>

<script>
    (function() {
        // DOM elements
        const dateInput = document.getElementById('dateInput');
        const celebrateBtn = document.getElementById('celebrateBtn');
        const splashDiv = document.getElementById('splashScreen');
        let activeSplash = false;
        let splashTimer = null;
        let animationIntervals = [];
        let activeAudio = null;

        // Helper: stop all ongoing animations / remove extra DOM elements (confetti, balloons, popups)
        function cleanupFloatingElements() {
            // remove all confetti, balloons, spark, firework, popup-toast not needed inside splash removal
            const confs = document.querySelectorAll('.confetti, .balloon, .spark, .firework, .popup-toast');
            confs.forEach(el => el.remove());
            // also clear all intervals that generate them
            for (let id of animationIntervals) {
                clearInterval(id);
            }
            animationIntervals = [];
        }

        // Stop any playing audio
        function stopAudio() {
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                activeAudio = null;
            }
        }

        // Play celebratory sound (short "cheer" + happy birthday style)
        function playCelebrationSound() {
            stopAudio();
            try {
                // Web Audio API friendly: we create a beep/synth fanfare for happy mood (since browser may block autoplay? but triggered by user click => allowed)
                // Buttons are clicked, also the date detection triggers after user input, so audio context allowed. 
                // We'll use simple oscillator? But for reliability, use base64 short cheer using Audio context.
                // Create a cheerful "pop" & "trumpet" style using Web Audio API for consistent support.
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                // Resume if suspended
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                // play a series of notes (happy birthday intro)
                const now = audioCtx.currentTime;
                const playTone = (freq, startTime, duration, volume = 0.4) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(volume, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };
                // classic happy birthday first phrase (approx)
                playTone(261.63, now, 0.4);      // C4
                playTone(293.66, now + 0.4, 0.4); // D4
                playTone(329.63, now + 0.8, 0.8); // E4 
                playTone(261.63, now + 1.6, 0.4);
                playTone(261.63, now + 2.0, 0.4);
                playTone(293.66, now + 2.4, 0.6);
                playTone(329.63, now + 3.0, 0.6);
                playTone(349.23, now + 3.6, 1.0); // F4
                // finish cheer
                setTimeout(() => {
                    if (audioCtx && audioCtx.state !== 'closed') {
                        const cheerOsc = audioCtx.createOscillator();
                        const cheerGain = audioCtx.createGain();
                        cheerOsc.connect(cheerGain);
                        cheerGain.connect(audioCtx.destination);
                        cheerOsc.type = 'triangle';
                        cheerOsc.frequency.value = 880;
                        cheerGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                        cheerGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
                        cheerOsc.start();
                        cheerOsc.stop(audioCtx.currentTime + 1.0);
                    }
                }, 500);
                // keep reference to avoid garbage (optional)
                activeAudio = { stop: () => audioCtx.close() };
            } catch(e) { console.warn("audio not supported", e); }
        }

        // generate confetti storm
        function startConfettiStorm() {
            const container = splashDiv;
            const createConfetti = () => {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                const colors = ['#e67e22', '#f1c40f', '#e74c3c', '#2ecc71', '#3498db', '#f39c12', '#ff6b6b'];
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = Math.random() * 100 + '%';
                conf.style.width = Math.random() * 12 + 6 + 'px';
                conf.style.height = Math.random() * 18 + 8 + 'px';
                conf.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                conf.style.opacity = Math.random() * 0.7 + 0.6;
                container.appendChild(conf);
                setTimeout(() => { if(conf && conf.remove) conf.remove(); }, 3500);
            };
            const interval = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) {
                    clearInterval(interval);
                    return;
                }
                for(let i=0;i<6;i++) createConfetti();
            }, 180);
            animationIntervals.push(interval);
        }

        // Balloons floating
        function startBalloons() {
            const container = splashDiv;
            const colorList = ['#FF595E', '#FFCA3A', '#8AC926', '#1982C4', '#6A4E9B', '#FF9F1C', '#E15554'];
            const createBalloon = () => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                const randColor = colorList[Math.floor(Math.random() * colorList.length)];
                balloon.style.backgroundColor = randColor;
                balloon.style.left = Math.random() * 90 + 5 + '%';
                balloon.style.width = 40 + Math.random() * 20 + 'px';
                balloon.style.height = 50 + Math.random() * 18 + 'px';
                balloon.style.animationDuration = 5 + Math.random() * 5 + 's';
                balloon.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(balloon);
                setTimeout(() => balloon.remove(), 9000);
            };
            const interval = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) { clearInterval(interval); return; }
                for(let i=0;i<2;i++) createBalloon();
            }, 1000);
            animationIntervals.push(interval);
        }

        // random fireworks/sparks bursts
        function startFireworks() {
            const container = splashDiv;
            const burstFirework = () => {
                const x = Math.random() * 100;
                const y = Math.random() * 70 + 10;
                for(let i=0;i<20;i++) {
                    const fire = document.createElement('div');
                    fire.classList.add('firework');
                    fire.style.left = x + '%';
                    fire.style.top = y + '%';
                    fire.style.transform = `translate(${Math.random() * 80 - 40}px, ${Math.random() * 80 - 40}px)`;
                    fire.style.background = `radial-gradient(circle, ${['#ffaa33','#ff5500','#ffdd77','#ff3366'][Math.floor(Math.random()*4)]}, gold)`;
                    container.appendChild(fire);
                    setTimeout(() => fire.remove(), 700);
                }
            };
            const interval = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) { clearInterval(interval); return; }
                burstFirework();
            }, 900);
            animationIntervals.push(interval);
        }

        // popup messages "Father of University", "Many Many Happy Returns" etc
        function startPopupMessages() {
            const messages = [
                "🎂 Best VC Ever! 🎂", "📚 Father of Our Institution 📚", "🌟 Guiding Light 🌟", 
                "🎈 Happy Birthday Sir! 🎈", "💖 We Love You Father 💖", "🏆 Greatest Leader 🏆",
                "✨ 10+ Seconds of Celebration ✨", "🎉 CHEERS TO OUR MENTOR 🎉"
            ];
            const container = document.body; // appear over splash
            const showPopup = () => {
                if (!splashDiv.classList.contains('splash-active')) return;
                const msg = messages[Math.floor(Math.random() * messages.length)];
                const pop = document.createElement('div');
                pop.classList.add('popup-toast');
                pop.textContent = msg;
                const leftPos = 20 + Math.random() * 60;
                const topPos = 20 + Math.random() * 60;
                pop.style.position = 'fixed';
                pop.style.left = leftPos + '%';
                pop.style.top = topPos + '%';
                pop.style.transform = 'translate(-50%, -50%)';
                pop.style.zIndex = 3000;
                pop.style.whiteSpace = 'nowrap';
                pop.style.animation = 'popFly 0.5s ease-out forwards';
                document.body.appendChild(pop);
                setTimeout(() => pop.remove(), 2000);
            };
            const interval = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) clearInterval(interval);
                else showPopup();
            }, 1300);
            animationIntervals.push(interval);
        }

        // additional sparkling background stars
        function startSparkleEffect() {
            const container = splashDiv;
            const genSpark = () => {
                const sp = document.createElement('div');
                sp.classList.add('spark');
                sp.style.left = Math.random() * 100 + '%';
                sp.style.top = Math.random() * 100 + '%';
                sp.style.width = '6px';
                sp.style.height = '6px';
                container.appendChild(sp);
                setTimeout(() => sp.remove(), 800);
            };
            const intv = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) clearInterval(intv);
                else for(let i=0;i<5;i++) genSpark();
            }, 400);
            animationIntervals.push(intv);
        }

        // main splash show with 10+ sec duration, and force all animations & sounds
        function showFullSplash() {
            if (activeSplash) return;
            // clear possible previous leftovers
            cleanupFloatingElements();
            stopAudio();

            // Remove any existing timer progress clones
            const oldProgress = document.querySelector('.timer-progress');
            if(oldProgress) oldProgress.style.animation = 'none';
            // reset timer bar
            const newProgress = document.querySelector('.splash-timer .timer-progress');
            if(newProgress) {
                newProgress.style.animation = 'none';
                newProgress.offsetHeight; // reflow
                newProgress.style.animation = 'shrinkTimer 10s linear forwards';
            }

            // show splash
            splashDiv.classList.add('splash-active');
            activeSplash = true;

            // play sound celebration (user gesture already from button)
            playCelebrationSound();

            // start all animations
            startConfettiStorm();
            startBalloons();
            startFireworks();
            startPopupMessages();
            startSparkleEffect();

            // also spin extra floating "happy birthday" text clones occasionally
            const extraTextInterval = setInterval(() => {
                if (!splashDiv.classList.contains('splash-active')) { clearInterval(extraTextInterval); return; }
                const floatingBless = document.createElement('div');
                floatingBless.textContent = ['🎂', '🥳', '🎈', '🎉', '💐', '👑'][Math.floor(Math.random()*6)];
                floatingBless.style.position = 'absolute';
                floatingBless.style.fontSize = '2rem';
                floatingBless.style.left = Math.random() * 90 + '%';
                floatingBless.style.top = Math.random() * 80 + '%';
                floatingBless.style.opacity = '0.8';
                floatingBless.style.animation = 'floatText 0.7s ease-out forwards';
                floatingBless.style.pointerEvents = 'none';
                splashDiv.appendChild(floatingBless);
                setTimeout(() => floatingBless.remove(), 1500);
            }, 700);
            animationIntervals.push(extraTextInterval);

            // Auto close after 10+ seconds (exactly 10 seconds timer)
            splashTimer = setTimeout(() => {
                if (activeSplash) {
                    hideSplashAndReset();
                }
            }, 10000); // 10 seconds as required, plus extra tolerance keeps animations
        }

        function hideSplashAndReset() {
            if (!activeSplash) return;
            // remove splash class, hide gracefully
            splashDiv.classList.remove('splash-active');
            activeSplash = false;
            // stop all ongoing animation intervals
            cleanupFloatingElements();
            // clear timer
            if (splashTimer) clearTimeout(splashTimer);
            splashTimer = null;
            // additionally remove any leftover timer progress animation
            const progressElem = document.querySelector('.timer-progress');
            if(progressElem) progressElem.style.animation = '';
            // stop audio
            stopAudio();
        }

        // Date validation: check if input matches pattern dd/mm/yyyy where day=20, month=05 (any year)
        function isValidBirthDate(dateStr) {
            // trim spaces
            const trimmed = dateStr.trim();
            // regex: day 20, month 05, any 4-digit year (with possible separators like / or - but we expect /)
            const regex = /^20\/05\/(\d{4})$/;
            if (regex.test(trimmed)) {
                return true;
            }
            // also allow 20-05-xxxx just in case? but we enforce slash per hint but relax a bit
            const altRegex = /^20-05-(\d{4})$/;
            if (altRegex.test(trimmed)) return true;
            // accept 20/05/xx but year must be 4 digit? anyway according to spec "20/05/xxxx"
            return false;
        }

        // triggered when user clicks surprise or on input if we detect date formatted
        function triggerSurprise() {
            const rawDate = dateInput.value;
            if (isValidBirthDate(rawDate)) {
                // valid date triggers splash
                showFullSplash();
            } else {
                // gentle error feedback
                const originalBtnText = celebrateBtn.innerText;
                celebrateBtn.innerText = "❌ Enter 20/05/yyyy ❌";
                celebrateBtn.style.background = "#c0392b";
                setTimeout(() => {
                    celebrateBtn.innerText = originalBtnText;
                    celebrateBtn.style.background = "linear-gradient(95deg, #e67e22, #f39c12)";
                }, 1500);
                dateInput.style.borderColor = "#e67e22";
                dateInput.style.animation = 'shake 0.3s';
                setTimeout(() => dateInput.style.animation = '', 500);
            }
        }

        // Add shake CSS
        const styleShake = document.createElement('style');
        styleShake.textContent = `@keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } 100% { transform: translateX(0); } }`;
        document.head.appendChild(styleShake);

        // Event listeners
        celebrateBtn.addEventListener('click', triggerSurprise);
        dateInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                triggerSurprise();
            }
        });
        // prefill sample placeholder nice but not mandatory
        dateInput.placeholder = "20/05/2025";
        // if needed to avoid double splash
    })();
</script>
</body>
